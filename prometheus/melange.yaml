# Melange build configuration for minimal Prometheus
# Builds Prometheus from source (Go) — no builtinassets tag for minimal footprint.
# All core functionality (metrics scraping, PromQL, alerting, HTTP API) works fully.
# The browser UI at /graph is not available without the embedded assets,
# but the API at /api/v1/... is fully functional.

package:
  name: prometheus-minimal
  version: 3.11.3
  epoch: 0
  description: "Minimal Prometheus monitoring server built from source"
  copyright:
    - license: Apache-2.0

vars:
  # SHA256 checksum of source tarball - updated by update-prometheus.yml workflow
  sha256: 37bb17f10ec8c36be21452b2efbbc51fc2a94c3d75569c02b8ea0c8cf8ffcfb0

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - build-base
      - go
      - git

pipeline:
  # Download and verify Prometheus source
  - runs: |
      mkdir -p /home/build
      curl -fsSL --retry 5 --retry-delay 10 "https://github.com/prometheus/prometheus/archive/refs/tags/v${{package.version}}.tar.gz" \
        -o /home/build/prometheus.tar.gz

      # Verify checksum
      echo "${{vars.sha256}}  /home/build/prometheus.tar.gz" | sha256sum -c -

      cd /home/build
      tar xzf prometheus.tar.gz
      rm prometheus.tar.gz

  # patch-go-deps: auto-generated — do not edit manually
  - runs: |
      cd /home/build/prometheus-${{package.version}}
      go get github.com/buger/jsonparser@v1.1.2
      go get go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
      go get go.opentelemetry.io/otel/sdk@v1.43.0
      go mod tidy
  # end-patch-go-deps

  # Build Prometheus from source (static binary, no embedded web UI)
  - runs: |
      cd /home/build/prometheus-${{package.version}}
      GOTOOLCHAIN=local CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w \
          -X github.com/prometheus/common/version.Version=${{package.version}} \
          -X github.com/prometheus/common/version.Branch=HEAD \
          -X github.com/prometheus/common/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
          -X github.com/prometheus/common/version.BuildUser=melange" \
        -o prometheus \
        ./cmd/prometheus

      # Build promtool
      GOTOOLCHAIN=local CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w \
          -X github.com/prometheus/common/version.Version=${{package.version}}" \
        -o promtool \
        ./cmd/promtool

  # Install to destdir
  - runs: |
      mkdir -p "${{targets.destdir}}/usr/bin"
      cp /home/build/prometheus-${{package.version}}/prometheus "${{targets.destdir}}/usr/bin/"
      cp /home/build/prometheus-${{package.version}}/promtool "${{targets.destdir}}/usr/bin/"

      # Default configuration file
      mkdir -p "${{targets.destdir}}/etc/prometheus"
      cat > "${{targets.destdir}}/etc/prometheus/prometheus.yml" << 'EOF'
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: "prometheus"
          static_configs:
            - targets: ["localhost:9090"]
      EOF

      # Data and rules directories are created by apko paths:
      # /prometheus (data), /etc/prometheus/rules (rules)

  # Verify the build
  - runs: |
      echo "Verifying Prometheus build..."
      "${{targets.destdir}}/usr/bin/prometheus" --version
      "${{targets.destdir}}/usr/bin/promtool" --version
      echo "Checking binary sizes..."
      ls -lh "${{targets.destdir}}/usr/bin/prometheus"
      ls -lh "${{targets.destdir}}/usr/bin/promtool"

update:
  enabled: true
  github:
    identifier: prometheus/prometheus
    use-tag: true
    tag-filter: "v3."
