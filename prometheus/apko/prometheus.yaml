# Minimal Prometheus image - built from source via melange
# CVE patching via daily rebuilds from upstream source

contents:
  repositories:
    - https://packages.wolfi.dev/os
    # Local melange-built packages (passed via --repository-append CLI flag)
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    # Local signing key passed via --keyring-append CLI flag
  packages:
    # Base filesystem
    - wolfi-baselayout

    # Our Prometheus (built from source via melange)
    - prometheus-minimal

    # Core libraries
    - glibc
    - glibc-locale-posix
    - ld-linux

    # Certificates (needed for scraping HTTPS targets)
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: prometheus
      gid: 65532
  users:
    - username: prometheus
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/prometheus

cmd: >-
  --config.file=/etc/prometheus/prometheus.yml
  --storage.tsdb.path=/prometheus
  --web.console.libraries=/usr/share/prometheus/console_libraries
  --web.console.templates=/usr/share/prometheus/consoles

environment:
  PATH: /usr/bin:/bin

paths:
  - path: /etc/prometheus
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /etc/prometheus/rules
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /prometheus
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

annotations:
  org.opencontainers.image.title: "minimal-prometheus"
  org.opencontainers.image.description: "Hardened Prometheus monitoring server built from source via melange with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/prometheus"
  org.opencontainers.image.licenses: "Apache-2.0"

archs:
  - x86_64
  - aarch64
