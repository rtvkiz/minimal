# Melange build configuration for minimal etcd
# Builds etcd and etcdctl from source (Go) with static binaries

package:
  name: etcd-minimal
  version: 3.6.11
  epoch: 0
  description: "Minimal etcd distributed key-value store built from source"
  copyright:
    - license: Apache-2.0

vars:
  sha256: bdc9b21505f4587c81f33235b53b3cb02f28158eb3487ae158f90b9534f0c0f3

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - build-base
      - go

pipeline:
  - runs: |
      mkdir -p /home/build
      curl -fsSL --retry 5 --retry-all-errors "https://github.com/etcd-io/etcd/archive/refs/tags/v${{package.version}}.tar.gz" \
        -o /home/build/etcd.tar.gz
      echo "${{vars.sha256}}  /home/build/etcd.tar.gz" | sha256sum -c -
      cd /home/build && tar xzf etcd.tar.gz && rm etcd.tar.gz






  # patch-go-deps: auto-generated — do not edit manually
  - runs: |
      cd /home/build/etcd-${{package.version}}
      go get go.opentelemetry.io/otel/sdk@v1.43.0
      go get go.opentelemetry.io/otel@v1.41.0
      go mod tidy
  # end-patch-go-deps

  - runs: |
      # etcd 3.6 is a multi-module monorepo: server/, etcdctl/, etcdutl/ each
      # have their own go.mod and must be built from within their directory.

      # Build etcd server
      cd /home/build/etcd-${{package.version}}/server
      GOTOOLCHAIN=local CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w \
          -X go.etcd.io/etcd/api/v3/version.GitSHA=release" \
        -o /home/build/etcd \
        .

      # Build etcdctl
      cd /home/build/etcd-${{package.version}}/etcdctl
      GOTOOLCHAIN=local CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w" \
        -o /home/build/etcdctl \
        .

      # Build etcdutl
      cd /home/build/etcd-${{package.version}}/etcdutl
      GOTOOLCHAIN=local CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w" \
        -o /home/build/etcdutl \
        .

  - runs: |
      mkdir -p "${{targets.destdir}}/usr/bin"
      cp /home/build/etcd "${{targets.destdir}}/usr/bin/"
      cp /home/build/etcdctl "${{targets.destdir}}/usr/bin/"
      cp /home/build/etcdutl "${{targets.destdir}}/usr/bin/"

  - runs: |
      echo "Verifying etcd build..."
      "${{targets.destdir}}/usr/bin/etcd" --version
      "${{targets.destdir}}/usr/bin/etcdctl" version
      ls -lh "${{targets.destdir}}/usr/bin/"

update:
  enabled: true
  github:
    identifier: etcd-io/etcd
    use-tag: true
    tag-filter: "v3."
