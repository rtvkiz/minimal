# Melange build configuration for minimal etcd
# Builds etcd and etcdctl from source (Go) with static binaries

package:
  name: etcd-minimal
  version: 3.6.8
  epoch: 0
  description: "Minimal etcd distributed key-value store built from source"
  copyright:
    - license: Apache-2.0

vars:
  sha256: 703f43b7e26c761d9bee1f7d1377c2d671bac8879285b9868b6205ebde0f8eda

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - build-base
      - go

pipeline:
  - runs: |
      mkdir -p /home/build
      curl -fsSL "https://github.com/etcd-io/etcd/archive/refs/tags/v${{package.version}}.tar.gz" \
        -o /home/build/etcd.tar.gz
      echo "${{vars.sha256}}  /home/build/etcd.tar.gz" | sha256sum -c -
      cd /home/build && tar xzf etcd.tar.gz && rm etcd.tar.gz

  - runs: |
      cd /home/build/etcd-${{package.version}}

      BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

      # Build etcd server
      CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w \
          -X go.etcd.io/etcd/api/v3/version.GitSHA=release \
          -X go.etcd.io/etcd/server/v3/version=${{package.version}}" \
        -o etcd \
        ./server

      # Build etcdctl
      CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w" \
        -o etcdctl \
        ./etcdctl

      # Build etcdutl
      CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w" \
        -o etcdutl \
        ./etcdutl

  - runs: |
      mkdir -p "${{targets.destdir}}/usr/bin"
      cp /home/build/etcd-${{package.version}}/{etcd,etcdctl,etcdutl} \
        "${{targets.destdir}}/usr/bin/"

  - runs: |
      echo "Verifying etcd build..."
      "${{targets.destdir}}/usr/bin/etcd" --version
      "${{targets.destdir}}/usr/bin/etcdctl" version
      ls -lh "${{targets.destdir}}/usr/bin/"

update:
  enabled: true
  github:
    identifier: etcd-io/etcd
    use-tag: true
    tag-filter: "v3."
