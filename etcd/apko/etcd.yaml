# Minimal etcd image - built from source via melange

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - etcd-minimal
    - glibc
    - glibc-locale-posix
    - ld-linux
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: etcd
      gid: 65532
  users:
    - username: etcd
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/etcd

cmd: >-
  --data-dir=/var/lib/etcd
  --listen-client-urls=http://0.0.0.0:2379
  --advertise-client-urls=http://0.0.0.0:2379
  --listen-peer-urls=http://0.0.0.0:2380
  --initial-advertise-peer-urls=http://0.0.0.0:2380
  --initial-cluster=default=http://0.0.0.0:2380

environment:
  PATH: /usr/bin:/bin
  ETCD_DATA_DIR: /var/lib/etcd

paths:
  - path: /var/lib/etcd
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700

annotations:
  org.opencontainers.image.title: "minimal-etcd"
  org.opencontainers.image.description: "Hardened etcd distributed KV store built from source via melange"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/etcd"
  org.opencontainers.image.licenses: "Apache-2.0"

archs:
  - x86_64
  - aarch64
