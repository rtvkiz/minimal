# Melange build configuration for minimal PHP
# Builds PHP from source (php.net) - minimal CLI with openssl, libxml, curl, zlib
# You control version and security patches; no dependency on Wolfi's php-8.5 package

package:
  name: php-minimal
  version: 8.5.5
  epoch: 3
  description: "Minimal PHP CLI built from source"
  copyright:
    - license: PHP-3.01

vars:
  # SHA256 from https://www.php.net/releases/?json&version=8.5
  sha256: 276279f637a875a514346b332bba6d8b06c036cf7979a858e5c55f72c4874884

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - build-base
      - linux-headers
      - libxml2-dev
      - openssl-dev
      - zlib-dev
      - curl-dev
      - oniguruma-dev
      - pkgconf

pipeline:
  # Download and verify PHP source
  - runs: |
      mkdir -p /home/build
      curl -fsSL --retry 5 --retry-delay 10 "https://www.php.net/distributions/php-${{package.version}}.tar.gz" \
        -o /home/build/php.tar.gz
      echo "${{vars.sha256}}  /home/build/php.tar.gz" | sha256sum -c -
      cd /home/build
      tar xzf php.tar.gz
      rm php.tar.gz

  # Work around openssl-hardened-dev's restricted API surface.
  # Wolfi's openssl-hardened-dev defines OPENSSL_NO_DEPRECATED and sets
  # OPENSSL_CONFIGURED_API to 30600, which hides ERR_NUM_ERRORS (deprecated
  # in 3.0), RSA_PKCS1_PADDING, and other symbols PHP's openssl ext needs.
  # We strip OPENSSL_NO_DEPRECATED and compile with OPENSSL_API_COMPAT=10000
  # to request the full pre-3.0 API surface while staying within the
  # OPENSSL_CONFIGURED_API constraint.
  - runs: |
      sed -i 's/^#\s*define\s\+OPENSSL_NO_DEPRECATED$//' /usr/include/openssl/configuration.h

  # Configure and build PHP (minimal CLI only)
  - runs: |
      cd /home/build/php-${{package.version}}
      CFLAGS="$CFLAGS -DOPENSSL_API_COMPAT=10000" \
      ./configure \
        --prefix=/usr \
        --disable-all \
        --enable-cli \
        --with-openssl \
        --with-zlib \
        --enable-libxml \
        --with-libxml \
        --with-curl \
        --enable-mbstring \
        --enable-opcache \
        --without-sqlite3 \
        --without-pdo-sqlite
      make -j$(nproc)

  # Install to destdir (manual copy like Redis)
  - runs: |
      mkdir -p "${{targets.destdir}}/usr/bin"

      cp /home/build/php-${{package.version}}/sapi/cli/php "${{targets.destdir}}/usr/bin/php"
      cp /home/build/php-${{package.version}}/sapi/cgi/php-cgi "${{targets.destdir}}/usr/bin/php-cgi"

      strip --strip-unneeded "${{targets.destdir}}/usr/bin/php"
      strip --strip-unneeded "${{targets.destdir}}/usr/bin/php-cgi"

      echo "Verifying PHP build..."
      ls -lh "${{targets.destdir}}/usr/bin/php"
      ls -lh "${{targets.destdir}}/usr/bin/php-cgi"

update:
  enabled: true
  github:
    identifier: php/php-src
    use-tag: true
    tag-filter: "php-8.5."
