# Minimal Fluent Bit image - lightweight log processor/forwarder

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - fluent-bit-minimal
    - ca-certificates-bundle
    - libcurl-openssl4
    - libssl3
    - zlib
    - yaml

accounts:
  groups:
    - groupname: fluent-bit
      gid: 65532
  users:
    - username: fluent-bit
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/fluent-bit

cmd: -c /etc/fluent-bit/fluent-bit.yaml

environment:
  PATH: /usr/bin:/bin

paths:
  - path: /etc/fluent-bit
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

annotations:
  org.opencontainers.image.title: "minimal-fluent-bit"
  org.opencontainers.image.description: "Hardened Fluent Bit log processor built from source"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/fluent-bit"
  org.opencontainers.image.licenses: "Apache-2.0"

archs:
  - x86_64
  - aarch64
