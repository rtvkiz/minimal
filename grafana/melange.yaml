# Melange build configuration for minimal Grafana
# Builds Grafana from source: Go backend + Node.js/yarn 4 frontend
# Grafana 12.x uses the 'grafana' binary (grafana-server is deprecated)

package:
  name: grafana-minimal
  version: 12.4.1
  epoch: 0
  description: "Minimal Grafana observability platform built from source"
  copyright:
    - license: AGPL-3.0-only

vars:
  # SHA256 checksum of source tarball - updated by update-grafana.yml workflow
  sha256: 4d3fa7dc9160aa427602b798273016d745a82a536d67d941de720d2a906801f6

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - build-base
      - go
      - git
      - nodejs-22
      - nodejs-22-npm
      - python3

pipeline:
  # Download and verify Grafana source
  - runs: |
      mkdir -p /home/build
      curl -fsSL "https://github.com/grafana/grafana/archive/refs/tags/v${{package.version}}.tar.gz" \
        -o /home/build/grafana.tar.gz

      # Verify checksum
      echo "${{vars.sha256}}  /home/build/grafana.tar.gz" | sha256sum -c -

      cd /home/build
      tar xzf grafana.tar.gz
      rm grafana.tar.gz

  # Build Grafana frontend with yarn 4 via corepack
  # Grafana's package.json specifies "packageManager": "yarn@4.x.x"
  # corepack (bundled with Node.js 22) handles the correct yarn version
  - runs: |
      cd /home/build/grafana-${{package.version}}
      # Install yarn 4 (berry) directly; corepack is not needed
      npm install -g yarn@4
      yarn install --immutable
      yarn build

  # Build Grafana Go backend
  - runs: |
      cd /home/build/grafana-${{package.version}}
      CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w \
          -X main.version=${{package.version}} \
          -X main.commit=NA \
          -X main.buildstamp=$(date -u +%s)" \
        -o grafana \
        ./pkg/cmd/grafana

  # Install to destdir
  - runs: |
      cd /home/build/grafana-${{package.version}}

      # Binary
      mkdir -p "${{targets.destdir}}/usr/sbin"
      cp grafana "${{targets.destdir}}/usr/sbin/"

      # Frontend assets (built to public/)
      mkdir -p "${{targets.destdir}}/usr/share/grafana"
      cp -r public "${{targets.destdir}}/usr/share/grafana/"

      # Default configuration
      cp -r conf "${{targets.destdir}}/usr/share/grafana/"

      # Write a minimal default.ini override installed at /etc/grafana
      mkdir -p "${{targets.destdir}}/etc/grafana"
      cat > "${{targets.destdir}}/etc/grafana/grafana.ini" << 'EOF'
      [paths]
      data = /var/lib/grafana
      logs = /var/log/grafana
      plugins = /var/lib/grafana/plugins
      provisioning = /etc/grafana/provisioning

      [server]
      http_addr = 0.0.0.0
      http_port = 3000

      [security]
      admin_user = admin

      [analytics]
      reporting_enabled = false
      check_for_updates = false
      check_for_plugin_updates = false
      EOF

      mkdir -p "${{targets.destdir}}/etc/grafana/provisioning/datasources"
      mkdir -p "${{targets.destdir}}/etc/grafana/provisioning/dashboards"
      mkdir -p "${{targets.destdir}}/etc/grafana/provisioning/alerting"

      # Runtime dirs are created by apko paths: (var/lib/grafana, var/log/grafana)

  # Verify the build
  - runs: |
      echo "Verifying Grafana build..."
      "${{targets.destdir}}/usr/sbin/grafana" --version
      echo "Checking binary size..."
      ls -lh "${{targets.destdir}}/usr/sbin/grafana"
      echo "Checking frontend assets..."
      ls "${{targets.destdir}}/usr/share/grafana/public/"

update:
  enabled: true
  github:
    identifier: grafana/grafana
    use-tag: true
    tag-filter: "v12."
