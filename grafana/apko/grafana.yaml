# Minimal Grafana image - built from source via melange
# CVE patching via daily rebuilds from upstream source

contents:
  repositories:
    - https://packages.wolfi.dev/os
    # Local melange-built packages (passed via --repository-append CLI flag)
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    # Local signing key passed via --keyring-append CLI flag
  packages:
    # Base filesystem
    - wolfi-baselayout

    # Our Grafana (built from source via melange)
    - grafana-minimal

    # Core libraries (CGO_ENABLED=0 so only libc needed at startup)
    - glibc
    - glibc-locale-posix
    - ld-linux

    # Certificates (needed for HTTPS datasource connections)
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: grafana
      gid: 65532
  users:
    - username: grafana
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/sbin/grafana

cmd: server --config=/etc/grafana/grafana.ini

environment:
  PATH: /usr/sbin:/usr/bin:/bin
  GF_PATHS_HOME: /usr/share/grafana
  GF_PATHS_CONFIG: /etc/grafana/grafana.ini
  GF_PATHS_DATA: /var/lib/grafana
  GF_PATHS_LOGS: /var/log/grafana
  GF_PATHS_PLUGINS: /var/lib/grafana/plugins
  GF_PATHS_PROVISIONING: /etc/grafana/provisioning

paths:
  - path: /etc/grafana
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /etc/grafana/provisioning
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/lib/grafana
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/lib/grafana/plugins
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/log/grafana
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

annotations:
  org.opencontainers.image.title: "minimal-grafana"
  org.opencontainers.image.description: "Hardened Grafana observability platform built from source via melange with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/grafana"
  org.opencontainers.image.licenses: "AGPL-3.0-only"

archs:
  - x86_64
  - aarch64
