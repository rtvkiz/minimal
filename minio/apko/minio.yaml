# Minimal MinIO image - built from source via melange
# CVE patching via daily rebuilds from upstream source
# CGO_ENABLED=0 static binary - minimal runtime deps

contents:
  repositories:
    - https://packages.wolfi.dev/os
    # Local melange-built packages (passed via --repository-append CLI flag)
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    # Local signing key passed via --keyring-append CLI flag
  packages:
    # Base filesystem
    - wolfi-baselayout

    # Our MinIO (built from source via melange)
    - minio-minimal

    # Certificates (required for TLS and S3 client connections)
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: minio
      gid: 65532
  users:
    - username: minio
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/minio server --console-address :9001 /data

environment:
  PATH: /usr/bin:/bin

paths:
  - path: /data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "minimal-minio"
  org.opencontainers.image.description: "Hardened shell-less MinIO S3-compatible object storage built from source via melange with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/minio"
  org.opencontainers.image.licenses: "AGPL-3.0-only"

archs:
  - x86_64
  - aarch64
