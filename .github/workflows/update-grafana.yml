name: Update Grafana Version

on:
  schedule:
    # Check daily at 7:30am UTC
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new Grafana stable version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get current version and major series from melange.yaml
          CURRENT=$(grep '^  version:' grafana/melange.yaml | awk '{print $2}')
          CURRENT_MAJOR=$(echo "$CURRENT" | cut -d. -f1)

          if [ -z "$CURRENT" ]; then
            echo "::error::Failed to read current version from melange.yaml"
            exit 1
          fi

          echo "Current version: $CURRENT (major: $CURRENT_MAJOR)"

          # Get latest release from GitHub — releases/latest always points to newest stable
          LATEST_TAG=$(curl -sS --retry 3 --retry-delay 5 \
            --header "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/grafana/grafana/releases/latest" | \
            jq -r '.tag_name')

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "::error::Failed to fetch latest Grafana version"
            exit 1
          fi

          # Strip leading 'v' prefix
          LATEST="${LATEST_TAG#v}"

          # Validate version format strictly
          if ! [[ "$LATEST" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid Grafana version received: $LATEST"
            exit 1
          fi

          LATEST_MAJOR=$(echo "$LATEST" | cut -d. -f1)
          echo "Latest version: $LATEST (major: $LATEST_MAJOR)"

          if [ "$LATEST" != "$CURRENT" ] && [ "$LATEST_MAJOR" = "$CURRENT_MAJOR" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "Patch/minor update available: $CURRENT -> $LATEST"
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
            if [ "$LATEST_MAJOR" != "$CURRENT_MAJOR" ]; then
              echo "new_major=$LATEST_MAJOR" >> $GITHUB_OUTPUT
              echo "new_major_version=$LATEST" >> $GITHUB_OUTPUT
              echo "current_major=$CURRENT_MAJOR" >> $GITHUB_OUTPUT
              echo "New major version detected: Grafana ${LATEST_MAJOR}.x ($LATEST)"
            else
              echo "Already up to date"
            fi
          fi

      - name: Update version and checksum in all files
        if: steps.check.outputs.update_available == 'true'
        run: |
          VERSION="${{ steps.check.outputs.new_version }}"
          echo "Updating to Grafana $VERSION"

          # Download tarball and compute SHA256 checksum
          echo "Downloading Grafana $VERSION tarball..."
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/grafana/grafana/archive/refs/tags/v${VERSION}.tar.gz" \
            -o /tmp/grafana.tar.gz
          SHA256=$(sha256sum /tmp/grafana.tar.gz | awk '{print $1}')
          rm /tmp/grafana.tar.gz
          echo "SHA256: $SHA256"

          # Update grafana/melange.yaml - version
          sed -i "s/^  version: .*/  version: $VERSION/" grafana/melange.yaml

          # Update grafana/melange.yaml - checksum
          sed -i "s/^  sha256: .*/  sha256: $SHA256/" grafana/melange.yaml

          # Reset epoch to 0 for new upstream version
          sed -i "s/^  epoch: .*/  epoch: 0/" grafana/melange.yaml

          # Update tag-filter if major series matches (patch/minor update only)
          CURRENT_MAJOR=$(echo "${{ steps.check.outputs.current_version }}" | cut -d. -f1)
          sed -i "s/tag-filter: \"v${CURRENT_MAJOR}\.\"/tag-filter: \"v${CURRENT_MAJOR}.\"/" grafana/melange.yaml

          # Update Makefile
          sed -i "s/GRAFANA_VERSION ?= .*/GRAFANA_VERSION ?= $VERSION/" Makefile

          # Verify changes
          echo "=== grafana/melange.yaml ==="
          grep -E '(version:|sha256:)' grafana/melange.yaml | head -2
          echo "=== Makefile ==="
          grep 'GRAFANA_VERSION' Makefile

      - name: Create Pull Request
        if: steps.check.outputs.update_available == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "chore(grafana): bump to ${{ steps.check.outputs.new_version }}"
          body: |
            ## Summary

            Updates Grafana from `${{ steps.check.outputs.current_version }}` to `${{ steps.check.outputs.new_version }}`.

            ## Changes

            - `grafana/melange.yaml` - package version, SHA256 checksum, epoch reset
            - `Makefile` - GRAFANA_VERSION variable

            ## Image Tag

            Once merged, this will publish: `ghcr.io/rtvkiz/minimal-grafana:${{ steps.check.outputs.new_version }}-r0`

            ## Links

            - [Grafana Releases](https://github.com/grafana/grafana/releases)
            - [Release Notes for ${{ steps.check.outputs.new_version }}](https://github.com/grafana/grafana/releases/tag/v${{ steps.check.outputs.new_version }})

            ---

            This PR was automatically created by the [update-grafana](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-grafana.yml) workflow.
          branch: update-grafana-${{ steps.check.outputs.new_version }}
          commit-message: |
            chore(grafana): bump to ${{ steps.check.outputs.new_version }}

            Updates Grafana from ${{ steps.check.outputs.current_version }} to ${{ steps.check.outputs.new_version }}.
          delete-branch: true
          labels: |
            dependencies
            grafana

      - name: Create new major version issue
        if: steps.check.outputs.new_major != ''
        uses: actions/github-script@v7
        with:
          script: |
            const newMajor = '${{ steps.check.outputs.new_major }}';
            const newVersion = '${{ steps.check.outputs.new_major_version }}';
            const currentMajor = '${{ steps.check.outputs.current_major }}';
            const title = `chore(grafana): new major version available — Grafana ${newMajor}.x`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'grafana,dependencies',
            });
            if (issues.some(i => i.title.includes(`Grafana ${newMajor}.x`))) {
              console.log(`Issue for Grafana ${newMajor}.x already exists, skipping`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['dependencies', 'grafana'],
              body: [
                `## New Major Version Available`,
                ``,
                `Grafana **${newMajor}.x** is now available (first: \`${newVersion}\`). We are currently on **${currentMajor}.x**.`,
                ``,
                `### Upgrade Checklist`,
                ``,
                `- [ ] Review [Grafana ${newMajor}.x migration guide](https://grafana.com/docs/grafana/latest/upgrade-guide/)`,
                `- [ ] Check if \`./pkg/cmd/grafana\` package path is unchanged`,
                `- [ ] Verify Go ldflag variable names (\`main.version\`, \`main.commit\`, \`main.buildstamp\`)`,
                `- [ ] Verify yarn version in \`package.json\` (corepack uses \`packageManager\` field)`,
                `- [ ] Update \`grafana/melange.yaml\`: version, sha256, \`tag-filter\``,
                `- [ ] Update \`update-grafana.yml\`: \`tag-filter\` major series`,
                `- [ ] Build and test locally (\`make grafana\`)`,
                `- [ ] Verify CI passes`,
                ``,
                `---`,
                ``,
                `Automatically created by the [update-grafana](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/workflows/update-grafana.yml) workflow.`,
              ].join('\n'),
            });
          github-token: ${{ secrets.GITHUB_TOKEN }}
