name: Update OpenSearch Version

on:
  schedule:
    # Check daily at 6:40am UTC
    - cron: '40 6 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check for new OpenSearch versions
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Get current version from Makefile (opensearch has no melange.yaml)
          CURRENT=$(grep '^OPENSEARCH_VERSION ?=' Makefile | awk '{print $3}')
          MAJOR_VERSION=$(echo "$CURRENT" | cut -d. -f1)

          echo "Current major version: $MAJOR_VERSION"
          echo "Current full version: $CURRENT"

          # Get latest OpenSearch version for the same major line
          LATEST=$(curl -sS --retry 3 --retry-delay 5 \
            --header "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/opensearch-project/OpenSearch/tags?per_page=100" | \
            jq -r --arg MAJOR "$MAJOR_VERSION" '[.[] | .name | select(test("^" + $MAJOR + "\\.[0-9]+\\.[0-9]+$"))] | first')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Failed to fetch latest OpenSearch $MAJOR_VERSION.x version"
            exit 1
          fi

          echo "Latest $MAJOR_VERSION.x version: $LATEST"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update_available=true" >> "$GITHUB_OUTPUT"
            echo "new_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "current_major=$MAJOR_VERSION" >> "$GITHUB_OUTPUT"
            echo "Update available: $CURRENT -> $LATEST"
          else
            echo "update_available=false" >> "$GITHUB_OUTPUT"
            echo "current_major=$MAJOR_VERSION" >> "$GITHUB_OUTPUT"
            echo "Up to date for $MAJOR_VERSION.x line"
          fi

          # Check for new major version (CURRENT_MAJOR + 1)
          NEXT_MAJOR=$((MAJOR_VERSION + 1))
          LATEST_NEXT_MAJOR=$(curl -sS --retry 3 --retry-delay 5 \
            --header "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/opensearch-project/OpenSearch/tags?per_page=100" | \
            jq -r --arg NEXT "$NEXT_MAJOR" '[.[] | .name | select(test("^" + $NEXT + "\\.[0-9]+\\.[0-9]+$"))] | first // empty')
          
          if [ -n "$LATEST_NEXT_MAJOR" ]; then
            echo "next_major_version=$NEXT_MAJOR" >> "$GITHUB_OUTPUT"
            echo "next_major_tag=$LATEST_NEXT_MAJOR" >> "$GITHUB_OUTPUT"
            echo "::warning::New major OpenSearch version detected: $LATEST_NEXT_MAJOR"
          fi

      - name: Update version in all files
        if: steps.check.outputs.update_available == 'true'
        run: |
          NEW="${{ steps.check.outputs.new_version }}"
          OLD="${{ steps.check.outputs.current_version }}"
          echo "Updating to OpenSearch $NEW"

          # Update Makefile (opensearch has no melange.yaml — Makefile is source of truth)
          sed -i "s/OPENSEARCH_VERSION ?= $OLD/OPENSEARCH_VERSION ?= $NEW/" Makefile


          # Update README.md version table (line 295: | OpenSearch | X.Y.Z | ...)
          # We update 2.19.x or similar pattern
          sed -i "s/| OpenSearch | [0-9.]\+\.x /| OpenSearch | $NEW /" README.md || true
          # Also try direct replacement of the old version if it was not .x
          sed -i "s/| OpenSearch | $OLD /| OpenSearch | $NEW /" README.md || true

      - name: Create PR and enable auto-merge
        if: steps.check.outputs.update_available == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="update-opensearch-${{ steps.check.outputs.new_version }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(opensearch): bump to ${{ steps.check.outputs.new_version }}"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore(opensearch): bump to ${{ steps.check.outputs.new_version }}" \
            --label dependencies --label opensearch --label  \
            --body "$(cat <<'PRBODY'
          ## Summary
          
          Updates OpenSearch version tracking from `${{ steps.check.outputs.current_version }}` to `${{ steps.check.outputs.new_version }}`.
          
          This image uses the `opensearch-${{ steps.check.outputs.current_major }}` Wolfi package, which is rebuilt daily. This PR updates the version metadata in `Makefile` and `README.md` to reflect the latest release in the ${{ steps.check.outputs.current_major }}.x line.
          
          ## Changes
          
          - `Makefile` - `OPENSEARCH_VERSION` variable
          - `README.md` - Version Table
          
          ## Links
          
          - [OpenSearch Release Notes](https://opensearch.org/docs/latest/version-history/)
          
          ---
          
          This PR was automatically created by the [update-opensearch](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-opensearch.yml) workflow.
          PRBODY
          )")
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --auto --squash --delete-branch

      - name: Create new major version issue
        if: steps.check.outputs.next_major_version != ''
        uses: actions/github-script@v7
        with:
          script: |
            const nextMajor = '${{ steps.check.outputs.next_major_version }}';
            const nextTag = '${{ steps.check.outputs.next_major_tag }}';
            const title = `chore(opensearch): new major version detected — OpenSearch ${nextMajor}.x`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'opensearch,dependencies',
            });
            if (issues.some(i => i.title.includes(`OpenSearch ${nextMajor}.x`))) {
              console.log(`Issue for OpenSearch ${nextMajor}.x already exists, skipping`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['dependencies', 'opensearch'],
              body: [
                `## New Major OpenSearch Version Detected`,
                ``,
                `OpenSearch **${nextMajor}.x** tags have been detected (latest tag: \`${nextTag}\`).`,
                ``,
                `### Checklist for upgrade:`,
                ``,
                `- [ ] Check if Wolfi has \`opensearch-${nextMajor}\` package available: \`apk index -R https://packages.wolfi.dev/os/x86_64/APKINDEX.tar.gz | grep opensearch-${nextMajor}\``,
                `- [ ] Update \`opensearch/apko/opensearch.yaml\`: change \`opensearch-${{ steps.check.outputs.current_major }}\` to \`opensearch-${nextMajor}\``,
                `- [ ] Review [OpenSearch Breaking Changes](https://opensearch.org/docs/latest/version-history/)`,
                `- [ ] Verify image build and run \`opensearch/test.sh\``,
                ``,
                `---`,
                `*Detected by the [update-opensearch](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/update-opensearch.yml) workflow.*`,
              ].join('\n'),
            });
