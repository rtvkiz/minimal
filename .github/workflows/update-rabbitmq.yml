name: Update RabbitMQ Version

on:
  schedule:
    # Check daily at 7:10am UTC
    - cron: '10 7 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check for new RabbitMQ stable version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get latest stable 4.x release from GitHub (releases/latest always points to newest)
          LATEST_TAG=$(curl -sS --retry 3 --retry-delay 5 \
            --header "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/rabbitmq/rabbitmq-server/releases/latest" | \
            jq -r '.tag_name')

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "::error::Failed to fetch latest RabbitMQ version"
            exit 1
          fi

          # Strip leading 'v' prefix
          LATEST="${LATEST_TAG#v}"

          # Validate version format strictly
          if ! [[ "$LATEST" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid RabbitMQ version received: $LATEST"
            exit 1
          fi

          # Get current version from melange.yaml
          CURRENT=$(grep '^  version:' rabbitmq/melange.yaml | awk '{print $2}')

          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "Update available: $CURRENT -> $LATEST"
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Update version and checksum in all files
        if: steps.check.outputs.update_available == 'true'
        run: |
          VERSION="${{ steps.check.outputs.new_version }}"
          echo "Updating to RabbitMQ $VERSION"

          # Download generic-unix tarball and compute SHA256
          echo "Downloading RabbitMQ $VERSION generic-unix tarball..."
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/rabbitmq/rabbitmq-server/releases/download/v${VERSION}/rabbitmq-server-generic-unix-${VERSION}.tar.xz" \
            -o /tmp/rabbitmq.tar.xz
          SHA256=$(sha256sum /tmp/rabbitmq.tar.xz | awk '{print $1}')
          rm /tmp/rabbitmq.tar.xz
          echo "SHA256: $SHA256"

          # Update rabbitmq/melange.yaml - version
          sed -i "s/^  version: .*/  version: $VERSION/" rabbitmq/melange.yaml

          # Update rabbitmq/melange.yaml - checksum
          sed -i "s/^  sha256: .*/  sha256: $SHA256/" rabbitmq/melange.yaml

          # Reset epoch to 0 for new upstream version
          sed -i "s/^  epoch: .*/  epoch: 0/" rabbitmq/melange.yaml

          # Update Makefile
          sed -i "s/RABBITMQ_VERSION ?= .*/RABBITMQ_VERSION ?= $VERSION/" Makefile

          # Verify changes
          echo "=== rabbitmq/melange.yaml ==="
          grep -E '(version:|sha256:)' rabbitmq/melange.yaml | head -2
          echo "=== Makefile ==="
          grep 'RABBITMQ_VERSION' Makefile

      - name: Create Pull Request
        if: steps.check.outputs.update_available == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "chore(rabbitmq): bump to ${{ steps.check.outputs.new_version }}"
          body: |
            ## Summary

            Updates RabbitMQ from `${{ steps.check.outputs.current_version }}` to `${{ steps.check.outputs.new_version }}`.

            ## Changes

            - `rabbitmq/melange.yaml` - package version, SHA256 checksum, epoch reset
            - `Makefile` - RABBITMQ_VERSION variable

            ## Image Tag

            Once merged, this will publish: `ghcr.io/rtvkiz/minimal-rabbitmq:${{ steps.check.outputs.new_version }}-r0`

            ## Links

            - [RabbitMQ Releases](https://github.com/rabbitmq/rabbitmq-server/releases)
            - [Release Notes for ${{ steps.check.outputs.new_version }}](https://github.com/rabbitmq/rabbitmq-server/releases/tag/v${{ steps.check.outputs.new_version }})
            - [RabbitMQ Changelog](https://www.rabbitmq.com/release-notes/index.html)

            ---

            This PR was automatically created by the [update-rabbitmq](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-rabbitmq.yml) workflow.
          branch: update-rabbitmq-${{ steps.check.outputs.new_version }}
          commit-message: |
            chore(rabbitmq): bump to ${{ steps.check.outputs.new_version }}

            Updates RabbitMQ from ${{ steps.check.outputs.current_version }} to ${{ steps.check.outputs.new_version }}.
          delete-branch: true
          labels: |
            dependencies
            rabbitmq
