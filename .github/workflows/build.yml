name: Build Hardened Images

on:
  push:
    branches: [main]
    paths:
      - '*/apko/*.yaml'
      - '*/melange.yaml'
      - '*/test.sh'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  schedule:
    # Rebuild daily at 2am UTC to get latest CVE patches
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  # Schedule/dispatch get unique groups (never cancelled); push/PR cancel previous on same ref
  group: build-${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  GRYPE_VERSION: v0.109.1

jobs:
  #----------------------------------------------------------------------------
  # DETECT CHANGED IMAGES — only build what changed (full rebuild on cron/dispatch)
  #----------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      melange-matrix: ${{ steps.filter.outputs.melange-matrix }}
      apko-matrix: ${{ steps.filter.outputs.apko-matrix }}
      build-melange-matrix: ${{ steps.filter.outputs.build-melange-matrix }}
      has-melange: ${{ steps.filter.outputs.has-melange }}
      has-apko: ${{ steps.filter.outputs.has-apko }}
      has-build-melange: ${{ steps.filter.outputs.has-build-melange }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect changes and generate matrices
        id: filter
        run: |
          # Image configuration
          MELANGE_IMAGES='[
            {"name":"jenkins"},
            {"name":"redis-slim","apko":"redis-slim/apko/redis.yaml"},
            {"name":"mysql"},{"name":"memcached"},{"name":"caddy"},
            {"name":"haproxy"},{"name":"php"},{"name":"rails"},
            {"name":"kafka"},{"name":"valkey"},{"name":"nats"},
            {"name":"traefik"},{"name":"rabbitmq"},{"name":"minio"},
            {"name":"prometheus"},{"name":"mariadb"},{"name":"etcd"},
            {"name":"victoria-metrics"},{"name":"jaeger"},{"name":"otelcol"},
            {"name":"qdrant"},{"name":"envoy"},{"name":"gitea"}
          ]'
          APKO_IMAGES='[
            {"name":"python","grep":"python-[0-9]"},
            {"name":"node-slim","apko":"node-slim/apko/node.yaml","grep":"nodejs-[0-9]"},
            {"name":"go","grep":"go-[0-9]"},
            {"name":"nginx","grep":"nginx-mainline"},
            {"name":"httpd","grep":"apache2"},
            {"name":"postgres-slim","apko":"postgres-slim/apko/postgres.yaml","grep":"postgresql-[0-9]"},
            {"name":"bun","grep":"bun"},
            {"name":"sqlite","grep":"sqlite"},
            {"name":"dotnet","grep":"dotnet-[0-9].*-runtime"},
            {"name":"java","grep":"openjdk-[0-9].*-jre"},
            {"name":"opensearch","grep":"opensearch-3"},
            {"name":"deno","grep":"deno"}
          ]'

          # Determine if full rebuild is needed
          EVENT="${{ github.event_name }}"
          FULL_REBUILD=false

          if [[ "$EVENT" == "schedule" ]] || [[ "$EVENT" == "workflow_dispatch" ]]; then
            FULL_REBUILD=true
          else
            if [[ "$EVENT" == "pull_request" ]]; then
              DIFF_BASE="${{ github.event.pull_request.base.sha }}"
            else
              DIFF_BASE="${{ github.event.before }}"
            fi
            if [[ "$DIFF_BASE" == "0000000000000000000000000000000000000000" ]]; then
              FULL_REBUILD=true
            else
              CHANGED_FILES=$(git diff --name-only "$DIFF_BASE" "${{ github.sha }}" 2>/dev/null || echo ".github/workflows/build.yml")
              if echo "$CHANGED_FILES" | grep -q "^\.github/workflows/build\.yml$"; then
                FULL_REBUILD=true
              fi
            fi
          fi

          echo "Event: $EVENT, Full rebuild: $FULL_REBUILD"

          if [ "$FULL_REBUILD" = true ]; then
            CHANGED=$(echo "$MELANGE_IMAGES $APKO_IMAGES" | jq -s 'add | [.[].name]')
          else
            CHANGED=$(echo "$CHANGED_FILES" | grep -E '^[^./][^/]*/' | sed 's|/.*||' | sort -u | jq -R . | jq -s .)
            echo "Changed dirs: $CHANGED"
          fi

          # Generate melange-build matrix (per-arch entries)
          MELANGE_MATRIX=$(echo "$MELANGE_IMAGES" | jq -c --argjson changed "$CHANGED" '{include: [
            .[] | select(.name as $n | $changed | index($n)) |
            ((.arches // "x86_64,aarch64") | split(","))[] as $arch |
            {
              name: .name,
              melange_config: (.name + "/melange.yaml"),
              arch: $arch,
              runner: (if $arch == "aarch64" then "ubuntu-24.04-arm" else "ubuntu-latest" end)
            }
          ]}')

          # Generate build-melange matrix (one entry per image)
          BUILD_MELANGE_MATRIX=$(echo "$MELANGE_IMAGES" | jq -c --argjson changed "$CHANGED" '{include: [
            .[] | select(.name as $n | $changed | index($n)) |
            {
              name: .name,
              apko_config: (.apko // (.name + "/apko/" + .name + ".yaml")),
              melange_config: (.name + "/melange.yaml"),
              arches: (.arches // "x86_64,aarch64")
            }
          ]}')

          # Generate build-apko matrix
          APKO_MATRIX=$(echo "$APKO_IMAGES" | jq -c --argjson changed "$CHANGED" '{include: [
            .[] | select(.name as $n | $changed | index($n)) |
            {
              name: .name,
              apko_config: (.apko // (.name + "/apko/" + .name + ".yaml")),
              primary_grep: .grep
            }
          ]}')

          # Output matrices and flags
          {
            echo "melange-matrix=$MELANGE_MATRIX"
            echo "apko-matrix=$APKO_MATRIX"
            echo "build-melange-matrix=$BUILD_MELANGE_MATRIX"
            echo "has-melange=$(echo "$MELANGE_MATRIX" | jq '.include | length > 0')"
            echo "has-apko=$(echo "$APKO_MATRIX" | jq '.include | length > 0')"
            echo "has-build-melange=$(echo "$BUILD_MELANGE_MATRIX" | jq '.include | length > 0')"
          } >> "$GITHUB_OUTPUT"

          # Summary
          echo "### Build Matrix" >> $GITHUB_STEP_SUMMARY
          echo "- Melange builds: $(echo "$MELANGE_MATRIX" | jq '.include | length')" >> $GITHUB_STEP_SUMMARY
          echo "- Apko builds: $(echo "$APKO_MATRIX" | jq '.include | length')" >> $GITHUB_STEP_SUMMARY
          echo "- Image assemblies: $(echo "$BUILD_MELANGE_MATRIX" | jq '.include | length')" >> $GITHUB_STEP_SUMMARY

  #----------------------------------------------------------------------------
  # GENERATE EPHEMERAL SIGNING KEY (PRs only - secrets not available for forks)
  #----------------------------------------------------------------------------
  keygen:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Cache melange binary
        id: melange-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/bin/melange
          key: melange-0.41.1-${{ runner.arch }}

      - name: Install melange
        if: steps.melange-cache.outputs.cache-hit != 'true'
        run: go install chainguard.dev/melange@v0.41.1

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate ephemeral signing key
        run: |
          echo "Generating ephemeral key for PR build (not used for publishing)"
          melange keygen

      - name: Upload signing key
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: melange-ephemeral-key
          path: |
            melange.rsa
            melange.rsa.pub
          retention-days: 1

  #----------------------------------------------------------------------------
  # BUILD MELANGE PACKAGES (native runners per architecture)
  #----------------------------------------------------------------------------
  melange-build:
    needs: [detect-changes, keygen]
    if: always() && needs.detect-changes.outputs.has-melange == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.melange-matrix) }}

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Cache melange binary
        id: melange-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/bin/melange
          key: melange-0.41.1-${{ runner.arch }}

      - name: Install melange
        if: steps.melange-cache.outputs.cache-hit != 'true'
        run: go install chainguard.dev/melange@v0.41.1

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      # For PRs: download ephemeral key from keygen job
      - name: Download ephemeral signing key (PR)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: melange-ephemeral-key
          path: .

      # For push/schedule: use repository secret
      - name: Setup signing key (protected branch)
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.MELANGE_SIGNING_KEY }}" > melange.rsa
          echo "${{ secrets.MELANGE_SIGNING_KEY_PUB }}" > melange.rsa.pub
          chmod 600 melange.rsa

      - name: Pin latest Go from Wolfi
        run: |
          # Skip for non-Go images (kafka, jenkins, qdrant, etc.)
          if ! grep -q '^\s*- go$' "${{ matrix.melange_config }}"; then
            echo "No bare 'go' package in config — skipping"
            exit 0
          fi
          # Resolve the latest go-1.XX package from Wolfi's APKINDEX
          # This ensures builds always use the latest patched Go, preventing
          # stale stdlib CVEs from Go's toolchain auto-download fetching .0 releases
          ARCH=${{ matrix.arch }}
          curl -sfL --retry 5 --retry-delay 10 \
            "https://packages.wolfi.dev/os/${ARCH}/APKINDEX.tar.gz" -o /tmp/apkindex.tar.gz
          tar xzf /tmp/apkindex.tar.gz -C /tmp APKINDEX
          LATEST_GO=$(grep '^P:go-1\.' /tmp/APKINDEX \
            | grep -vE '(doc|asm|covdata|cover|nm|objdump|test2json)' \
            | sed 's/^P://' | sort -t. -k2 -n | tail -1)
          rm -f /tmp/apkindex.tar.gz /tmp/APKINDEX
          echo "Latest Go in Wolfi: $LATEST_GO"
          sed -i "s/- go$/- ${LATEST_GO}/" "${{ matrix.melange_config }}"
          echo "Go package in config:"
          grep -E '^\s*- go' "${{ matrix.melange_config }}" || true

      - name: Build package with melange
        run: |
          chmod 600 melange.rsa
          melange build ${{ matrix.melange_config }} \
            --arch ${{ matrix.arch }} \
            --signing-key melange.rsa \
            --out-dir ./packages \
            --runner docker

      - name: Upload packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: packages-${{ matrix.name }}-${{ matrix.arch }}
          path: |
            packages/
            melange.rsa.pub
          retention-days: 1

  #----------------------------------------------------------------------------
  # BUILD APKO-ONLY IMAGES (no melange dependency)
  #----------------------------------------------------------------------------
  build-apko:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has-apko == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.apko-matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Cache apko binary
        id: apko-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/bin/apko
          key: apko-1.1.6-${{ runner.arch }}

      - name: Install apko
        if: steps.apko-cache.outputs.cache-hit != 'true'
        run: go install chainguard.dev/apko@v1.1.6

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Setup cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build image with apko
        run: |
          apko build ${{ matrix.apko_config }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }} \
            ${{ matrix.name }}.tar \
            --arch x86_64
          docker load < ${{ matrix.name }}.tar
          LOADED_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep "minimal-${{ matrix.name }}" | head -1)
          docker tag "$LOADED_IMAGE" ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }}

      - name: Report image size
        run: |
          echo "## ${{ matrix.name }} Image Size" >> $GITHUB_STEP_SUMMARY
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | \
            grep "minimal-${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY || true

      - name: Cache Grype binary
        id: grype-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /usr/local/bin/grype
          key: grype-${{ env.GRYPE_VERSION }}-linux-amd64

      - name: Install Grype
        if: steps.grype-cache.outputs.cache-hit != 'true'
        run: |
          curl -fL --retry 5 --retry-delay 10 -o /tmp/grype.tar.gz \
            "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/grype_${GRYPE_VERSION#v}_linux_amd64.tar.gz"
          tar -tzf /tmp/grype.tar.gz > /dev/null
          tar -xzf /tmp/grype.tar.gz -C /usr/local/bin grype
          rm -f /tmp/grype.tar.gz

      - name: Verify Grype
        run: grype version

      - name: Scan image for vulnerabilities
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }}"
          grype "$IMAGE" -o json > grype-${{ matrix.name }}.json

      - name: Generate vulnerability report
        if: always()
        run: |
          REPORT="grype-${{ matrix.name }}.json"
          if [ ! -f "$REPORT" ]; then
            echo "## Security Scan: ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
            echo "Scan report not found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Count vulnerabilities by severity (grype uses Title Case severity)
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "CRITICAL")] | length' "$REPORT")
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "HIGH")] | length' "$REPORT")
          MEDIUM=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "MEDIUM")] | length' "$REPORT")
          LOW=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "LOW")] | length' "$REPORT")
          TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))

          # Header
          echo "## Security Scan: ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan date:** $(date -u +%Y-%m-%d) | **Image:** minimal-${{ matrix.name }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Summary table
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| HIGH | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| MEDIUM | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| LOW | $LOW |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL" -eq 0 ]; then
            echo "No vulnerabilities found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Detailed table for CRITICAL and HIGH
          if [ "$((CRITICAL + HIGH))" -gt 0 ]; then
            echo "### CRITICAL / HIGH Vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Library | CVE | Severity | Installed | Fixed | Title |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-----|----------|-----------|-------|-------|" >> $GITHUB_STEP_SUMMARY
            jq -r '
              [.matches[] | select(.vulnerability.severity | ascii_upcase | (. == "CRITICAL" or . == "HIGH"))]
              | sort_by(if .vulnerability.severity | ascii_upcase == "CRITICAL" then 0 else 1 end)
              | .[]
              | "| \(.artifact.name) | \(.vulnerability.id) | \(.vulnerability.severity | ascii_upcase) | \(.artifact.version) | \(.vulnerability.fix.versions[0] // "n/a") | \(.vulnerability.description // "n/a" | .[0:80]) |"
            ' "$REPORT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "No CRITICAL or HIGH vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vulnerability-report-${{ matrix.name }}
          path: grype-${{ matrix.name }}.json
          retention-days: 90

      - name: Generate SARIF report
        if: always() && hashFiles(format('grype-{0}.json', matrix.name)) != ''
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }}"
          grype "$IMAGE" -o sarif > grype-${{ matrix.name }}.sarif || true

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@66b39da20ccc656acc90dd27ea30f5d458ec33ce # v3.28.19
        if: always() && hashFiles(format('grype-{0}.sarif', matrix.name)) != ''
        continue-on-error: true
        with:
          sarif_file: 'grype-${{ matrix.name }}.sarif'
          category: 'grype-${{ matrix.name }}'

      - name: Extract version from SBOM
        id: version
        run: |
          # Read primary package name from apko config (source of truth)
          PRIMARY_PKG=$(grep -oE '${{ matrix.primary_grep }}[a-z0-9.\-]*' ${{ matrix.apko_config }} | head -1)
          if [ -z "$PRIMARY_PKG" ]; then
            echo "::error::Failed to extract primary package from ${{ matrix.apko_config }} using pattern '${{ matrix.primary_grep }}'"
            exit 1
          fi
          VERSION=$(jq -r --arg pkg "$PRIMARY_PKG" '.packages[] | select(.name == $pkg) | .versionInfo' sbom-x86_64.spdx.json | head -1)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to extract version for $PRIMARY_PKG from SBOM"
            exit 1
          fi
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Primary package: $PRIMARY_PKG, version: $VERSION"
          rm -f sbom-*.spdx.json

      - name: Test image
        run: |
          export IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }}"
          ./${{ matrix.name }}/test.sh

      - name: Publish image
        if: github.event_name != 'pull_request'
        run: |
          apko publish ${{ matrix.apko_config }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ steps.version.outputs.tag }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:latest \
            --arch x86_64,aarch64

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: |
            cosign sign --yes \
              ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ steps.version.outputs.tag }}

  #----------------------------------------------------------------------------
  # BUILD MELANGE-BASED IMAGES (needs packages from melange-build)
  #----------------------------------------------------------------------------
  build-melange:
    needs: [detect-changes, melange-build]
    # Run even if some melange-build entries failed — individual images whose
    # packages failed will error at artifact download, not cascade to others
    if: always() && needs.detect-changes.outputs.has-build-melange == 'true' && needs.melange-build.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.build-melange-matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Cache apko binary
        id: apko-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/bin/apko
          key: apko-1.1.6-${{ runner.arch }}

      - name: Install apko
        if: steps.apko-cache.outputs.cache-hit != 'true'
        run: go install chainguard.dev/apko@v1.1.6

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Setup cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Download x86_64 packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: packages-${{ matrix.name }}-x86_64
          path: ./packages-x86_64

      - name: Download aarch64 packages
        if: contains(matrix.arches, 'aarch64')
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: packages-${{ matrix.name }}-aarch64
          path: ./packages-aarch64

      - name: Merge packages
        run: |
          mkdir -p ./packages
          # Copy x86_64 packages
          cp -r ./packages-x86_64/packages/* ./packages/ 2>/dev/null || true
          # Copy aarch64 packages (merge into same structure)
          cp -r ./packages-aarch64/packages/* ./packages/ 2>/dev/null || true
          # Use signing key from either (they're the same content, different builds)
          cp ./packages-x86_64/melange.rsa.pub ./melange.rsa.pub

          echo "Merged package structure:"
          find ./packages -type f -name "*.apk" | head -20

      # For push/schedule: overwrite with repository public key (for publishing)
      - name: Setup signing key (protected branch)
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.MELANGE_SIGNING_KEY_PUB }}" > melange.rsa.pub

      - name: Build image with apko
        run: |
          apko build ${{ matrix.apko_config }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }} \
            ${{ matrix.name }}.tar \
            --arch x86_64 \
            --repository-append ./packages \
            --keyring-append ./melange.rsa.pub
          docker load < ${{ matrix.name }}.tar
          LOADED_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep "minimal-${{ matrix.name }}" | head -1)
          docker tag "$LOADED_IMAGE" ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }}

      - name: Report image size
        run: |
          echo "## ${{ matrix.name }} Image Size" >> $GITHUB_STEP_SUMMARY
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | \
            grep "minimal-${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY || true

      - name: Cache Grype binary
        id: grype-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /usr/local/bin/grype
          key: grype-${{ env.GRYPE_VERSION }}-linux-amd64

      - name: Install Grype
        if: steps.grype-cache.outputs.cache-hit != 'true'
        run: |
          curl -fL --retry 5 --retry-delay 10 -o /tmp/grype.tar.gz \
            "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/grype_${GRYPE_VERSION#v}_linux_amd64.tar.gz"
          tar -tzf /tmp/grype.tar.gz > /dev/null
          tar -xzf /tmp/grype.tar.gz -C /usr/local/bin grype
          rm -f /tmp/grype.tar.gz

      - name: Verify Grype
        run: grype version

      - name: Scan image for vulnerabilities
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }}"
          grype "$IMAGE" -o json > grype-${{ matrix.name }}.json

      - name: Generate vulnerability report
        if: always()
        run: |
          REPORT="grype-${{ matrix.name }}.json"
          if [ ! -f "$REPORT" ]; then
            echo "## Security Scan: ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
            echo "Scan report not found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Count vulnerabilities by severity (grype uses Title Case severity)
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "CRITICAL")] | length' "$REPORT")
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "HIGH")] | length' "$REPORT")
          MEDIUM=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "MEDIUM")] | length' "$REPORT")
          LOW=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "LOW")] | length' "$REPORT")
          TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))

          # Header
          echo "## Security Scan: ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan date:** $(date -u +%Y-%m-%d) | **Image:** minimal-${{ matrix.name }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Summary table
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| HIGH | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| MEDIUM | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| LOW | $LOW |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL" -eq 0 ]; then
            echo "No vulnerabilities found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Detailed table for CRITICAL and HIGH
          if [ "$((CRITICAL + HIGH))" -gt 0 ]; then
            echo "### CRITICAL / HIGH Vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Library | CVE | Severity | Installed | Fixed | Title |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-----|----------|-----------|-------|-------|" >> $GITHUB_STEP_SUMMARY
            jq -r '
              [.matches[] | select(.vulnerability.severity | ascii_upcase | (. == "CRITICAL" or . == "HIGH"))]
              | sort_by(if .vulnerability.severity | ascii_upcase == "CRITICAL" then 0 else 1 end)
              | .[]
              | "| \(.artifact.name) | \(.vulnerability.id) | \(.vulnerability.severity | ascii_upcase) | \(.artifact.version) | \(.vulnerability.fix.versions[0] // "n/a") | \(.vulnerability.description // "n/a" | .[0:80]) |"
            ' "$REPORT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "No CRITICAL or HIGH vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vulnerability-report-${{ matrix.name }}
          path: grype-${{ matrix.name }}.json
          retention-days: 90

      - name: Generate SARIF report
        if: always() && hashFiles(format('grype-{0}.json', matrix.name)) != ''
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }}"
          grype "$IMAGE" -o sarif > grype-${{ matrix.name }}.sarif || true

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@66b39da20ccc656acc90dd27ea30f5d458ec33ce # v3.28.19
        if: always() && hashFiles(format('grype-{0}.sarif', matrix.name)) != ''
        continue-on-error: true
        with:
          sarif_file: 'grype-${{ matrix.name }}.sarif'
          category: 'grype-${{ matrix.name }}'

      - name: Extract version from melange config
        id: version
        run: |
          PKG_VERSION=$(awk '/^  version:/ {print $2}' "${{ matrix.melange_config }}")
          PKG_EPOCH=$(awk '/^  epoch:/ {print $2}' "${{ matrix.melange_config }}")
          if [ -z "$PKG_VERSION" ]; then
            echo "::error::Failed to extract version from ${{ matrix.melange_config }}"
            exit 1
          fi
          echo "tag=${PKG_VERSION}-r${PKG_EPOCH}" >> $GITHUB_OUTPUT
          echo "Image version: ${PKG_VERSION}-r${PKG_EPOCH}"

      - name: Test image
        run: |
          export IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ github.sha }}"
          ./${{ matrix.name }}/test.sh

      - name: Publish image
        if: github.event_name != 'pull_request'
        run: |
          apko publish ${{ matrix.apko_config }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ steps.version.outputs.tag }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:latest \
            --arch ${{ matrix.arches }} \
            --repository-append ./packages \
            --keyring-append ./melange.rsa.pub

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: |
            cosign sign --yes \
              ${{ env.REGISTRY }}/${{ github.repository_owner }}/minimal-${{ matrix.name }}:${{ steps.version.outputs.tag }}

  #----------------------------------------------------------------------------
  # SUMMARY
  #----------------------------------------------------------------------------
  summary:
    needs: [detect-changes, build-apko, build-melange]
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Check results
        run: |
          HAS_APKO="${{ needs.detect-changes.outputs.has-apko }}"
          HAS_MELANGE="${{ needs.detect-changes.outputs.has-build-melange }}"
          APKO="${{ needs.build-apko.result }}"
          MELANGE="${{ needs.build-melange.result }}"
          echo "build-apko: $APKO (expected: $HAS_APKO)"
          echo "build-melange: $MELANGE (expected: $HAS_MELANGE)"

          FAILED=false
          if [ "$HAS_APKO" = "true" ] && [ "$APKO" != "success" ]; then
            echo "::error::build-apko did not succeed: $APKO"
            FAILED=true
          fi
          if [ "$HAS_MELANGE" = "true" ] && [ "$MELANGE" != "success" ]; then
            echo "::error::build-melange did not succeed: $MELANGE"
            FAILED=true
          fi
          if [ "$FAILED" = true ]; then
            exit 1
          fi
          echo "All expected builds succeeded!"

  #----------------------------------------------------------------------------
  # PUBLISH VULNERABILITY REPORT TO GITHUB PAGES
  #----------------------------------------------------------------------------
  publish-vuln-report:
    needs: [build-apko, build-melange]
    runs-on: ubuntu-latest
    # Only publish on full rebuilds (schedule/dispatch) — partial push builds
    # would overwrite the full report page with incomplete data
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download all vulnerability reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: vulnerability-report-*
          merge-multiple: true
          path: reports/

      - name: Generate HTML report
        run: |
          mkdir -p site

          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          CSS='body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:1100px;margin:40px auto;padding:0 20px;color:#1f2328}h1{font-size:24px;margin-bottom:4px}p.meta{color:#656d76;font-size:14px;margin-bottom:24px}p.meta a,p.back a{color:#0969da;text-decoration:none}p.back{font-size:14px;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#f6f8fa;text-align:left;padding:8px 12px;border:1px solid #d0d7de;font-weight:600}td{padding:8px 12px;border:1px solid #d0d7de;vertical-align:top}tr:nth-child(even):not(.totals){background:#f6f8fa}tr.totals{border-top:2px solid #d0d7de}a{color:#0969da;text-decoration:none}a:hover{text-decoration:underline}.critical{color:#d1242f}.high{color:#bc4c00}.medium{color:#bf8700}.low{color:#656d76}.zero{color:#1f2328}'

          ROWS=""
          TOTAL_CRITICAL=0
          TOTAL_HIGH=0
          TOTAL_MEDIUM=0
          TOTAL_LOW=0

          for f in reports/grype-*.json; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f" .json | sed 's/^grype-//')
            C=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "CRITICAL")] | length' "$f")
            H=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "HIGH")] | length' "$f")
            M=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "MEDIUM")] | length' "$f")
            L=$(jq '[.matches[] | select(.vulnerability.severity | ascii_upcase == "LOW")] | length' "$f")
            T=$((C + H + M + L))
            TOTAL_CRITICAL=$((TOTAL_CRITICAL + C))
            TOTAL_HIGH=$((TOTAL_HIGH + H))
            TOTAL_MEDIUM=$((TOTAL_MEDIUM + M))
            TOTAL_LOW=$((TOTAL_LOW + L))
            CCLASS=$([ "$C" -gt 0 ] && echo "critical" || echo "zero")
            HCLASS=$([ "$H" -gt 0 ] && echo "high" || echo "zero")
            MCLASS=$([ "$M" -gt 0 ] && echo "medium" || echo "zero")
            LCLASS=$([ "$L" -gt 0 ] && echo "low" || echo "zero")
            ROWS="${ROWS}<tr><td><a href=\"${NAME}.html\">${NAME}</a></td><td class=\"${CCLASS}\">${C}</td><td class=\"${HCLASS}\">${H}</td><td class=\"${MCLASS}\">${M}</td><td class=\"${LCLASS}\">${L}</td><td>${T}</td></tr>\n"

            # Per-image detail page
            CVE_ROWS=$(jq -r '
              .matches
              | sort_by(if .vulnerability.severity | ascii_upcase == "CRITICAL" then 0 elif .vulnerability.severity | ascii_upcase == "HIGH" then 1 elif .vulnerability.severity | ascii_upcase == "MEDIUM" then 2 else 3 end)
              | .[]
              | "<tr><td>\(.artifact.name)</td><td>\(.artifact.version)</td><td class=\"\(.vulnerability.severity | ascii_downcase)\">\(.vulnerability.severity | ascii_upcase)</td><td><a href=\"\(.vulnerability.dataSource // "")\" target=\"_blank\">\(.vulnerability.id)</a></td><td>\(.vulnerability.fix.versions[0] // "n/a")</td><td>\(.vulnerability.description // "" | .[0:150] | @html)</td></tr>"
            ' "$f" || true)

            cat > "site/${NAME}.html" <<DETAIL
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>${NAME} — Vulnerability Report</title>
            <style>${CSS}</style>
          </head>
          <body>
            <p class="back"><a href="index.html">← All images</a></p>
            <h1>${NAME}</h1>
            <p class="meta">Updated: ${BUILD_DATE} &nbsp;|&nbsp; Commit: <a href="${RUN_URL}">${SHORT_SHA}</a></p>
            <table>
              <thead><tr><th>Package</th><th>Version</th><th>Severity</th><th>CVE</th><th>Fix Version</th><th>Description</th></tr></thead>
              <tbody>
                ${CVE_ROWS:-<tr><td colspan="6">No vulnerabilities found.</td></tr>}
              </tbody>
            </table>
          </body>
          </html>
          DETAIL
          done

          TOTAL_ALL=$((TOTAL_CRITICAL + TOTAL_HIGH + TOTAL_MEDIUM + TOTAL_LOW))
          ROWS="${ROWS}<tr class=\"totals\"><td><strong>Total</strong></td><td class=\"critical\"><strong>${TOTAL_CRITICAL}</strong></td><td class=\"high\"><strong>${TOTAL_HIGH}</strong></td><td class=\"medium\"><strong>${TOTAL_MEDIUM}</strong></td><td class=\"low\"><strong>${TOTAL_LOW}</strong></td><td><strong>${TOTAL_ALL}</strong></td></tr>"

          cat > site/index.html <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Vulnerability Report — Minimal Images</title>
            <style>${CSS}</style>
          </head>
          <body>
            <h1>Vulnerability Report</h1>
            <p class="meta">Updated: ${BUILD_DATE} &nbsp;|&nbsp; Commit: <a href="${RUN_URL}">${SHORT_SHA}</a></p>
            <table>
              <thead><tr><th>Image</th><th>Critical</th><th>High</th><th>Medium</th><th>Low</th><th>Total</th></tr></thead>
              <tbody>$(echo -e "$ROWS")</tbody>
            </table>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  #----------------------------------------------------------------------------
  # CLEANUP OLD VERSIONS
  #----------------------------------------------------------------------------
  cleanup:
    needs: [build-apko, build-melange]
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Delete old untagged versions
        run: |
          gh api "/users/${{ github.repository_owner }}/packages?package_type=container" \
            --paginate --jq '.[].name' 2>/dev/null | \
          while read -r pkg; do
            echo "Cleaning old versions from $pkg..."
            gh api "/users/${{ github.repository_owner }}/packages/container/$pkg/versions" \
              --paginate --jq '[.[] | select(.metadata.container.tags | length == 0)] | sort_by(.created_at) | reverse | .[4:] | .[].id' 2>/dev/null | \
            while read -r id; do
              echo "  Deleting version $id"
              gh api --method DELETE "/users/${{ github.repository_owner }}/packages/container/$pkg/versions/$id" 2>/dev/null || true
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
