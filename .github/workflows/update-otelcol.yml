name: Update OTel Collector Version

on:
  schedule:
    # Check daily at 8:20am UTC
    - cron: '20 8 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check for new OTel Collector release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT=$(grep '^  version:' otelcol/melange.yaml | awk '{print $2}')

          # Get latest release — filter to stable releases (no alpha/beta/rc)
          LATEST_TAG=$(curl -sS --retry 3 --retry-delay 5 \
            --header "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/open-telemetry/opentelemetry-collector/releases?per_page=20" | \
            jq -r '[.[] | select(.prerelease == false and .draft == false) | .tag_name] | first')

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "::error::Failed to fetch latest OTel Collector version"
            exit 1
          fi

          LATEST="${LATEST_TAG#v}"

          if ! [[ "$LATEST" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid OTel Collector version received: $LATEST"
            exit 1
          fi

          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Update version and checksum
        if: steps.check.outputs.update_available == 'true'
        run: |
          VERSION="${{ steps.check.outputs.new_version }}"
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/open-telemetry/opentelemetry-collector/archive/refs/tags/v${VERSION}.tar.gz" \
            -o /tmp/otelcol.tar.gz
          SHA256=$(sha256sum /tmp/otelcol.tar.gz | awk '{print $1}')
          rm /tmp/otelcol.tar.gz

          sed -i "s/^  version: .*/  version: $VERSION/" otelcol/melange.yaml
          sed -i "s/^  sha256: .*/  sha256: $SHA256/" otelcol/melange.yaml
          sed -i "s/^  epoch: .*/  epoch: 0/" otelcol/melange.yaml
          sed -i "s/OTELCOL_VERSION ?= .*/OTELCOL_VERSION ?= $VERSION/" Makefile

          echo "=== otelcol/melange.yaml ===" && grep -E '(version:|sha256:)' otelcol/melange.yaml | head -2

      - name: Create Pull Request
        if: steps.check.outputs.update_available == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "chore(otelcol): bump to ${{ steps.check.outputs.new_version }}"
          body: |
            ## Summary

            Updates OpenTelemetry Collector from `${{ steps.check.outputs.current_version }}` to `${{ steps.check.outputs.new_version }}`.

            ## Changes

            - `otelcol/melange.yaml` - package version, SHA256 checksum, epoch reset
            - `Makefile` - OTELCOL_VERSION variable

            ## Image Tag

            Once merged, this will publish: `ghcr.io/rtvkiz/minimal-otelcol:${{ steps.check.outputs.new_version }}-r0`

            ## Links

            - [OTel Collector Releases](https://github.com/open-telemetry/opentelemetry-collector/releases)
            - [Changelog for ${{ steps.check.outputs.new_version }}](https://github.com/open-telemetry/opentelemetry-collector/releases/tag/v${{ steps.check.outputs.new_version }})

            ---

            This PR was automatically created by the [update-otelcol](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-otelcol.yml) workflow.
          branch: update-otelcol-${{ steps.check.outputs.new_version }}
          commit-message: |
            chore(otelcol): bump to ${{ steps.check.outputs.new_version }}

            Updates OTel Collector from ${{ steps.check.outputs.current_version }} to ${{ steps.check.outputs.new_version }}.
          delete-branch: true
          labels: |
            dependencies
            otelcol
