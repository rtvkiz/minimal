name: Update Redis Version

on:
  schedule:
    # Check daily at 6:30am UTC
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check for new Redis stable version
        id: check
        run: |
          # Get latest stable release from the Redis download server directory listing.
          # This avoids GitHub API rate limits; only stable releases appear here.
          LATEST=$(curl -sS --retry 3 --retry-delay 5 "https://download.redis.io/releases/" | \
            grep -oE 'redis-[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz' | \
            grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | \
            sort -t. -k1,1n -k2,2n -k3,3n | tail -1)

          if [ -z "$LATEST" ]; then
            echo "::error::Failed to fetch latest Redis version from download.redis.io"
            exit 1
          fi

          # Validate version format strictly
          if ! [[ "$LATEST" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid Redis version received: $LATEST"
            exit 1
          fi

          # Get current version from melange.yaml
          CURRENT=$(grep '^  version:' redis-slim/melange.yaml | awk '{print $2}')

          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "Update available: $CURRENT -> $LATEST"
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Update version and checksum in all files
        if: steps.check.outputs.update_available == 'true'
        run: |
          VERSION="${{ steps.check.outputs.new_version }}"
          echo "Updating to Redis $VERSION"

          # Download tarball and compute SHA256 checksum
          echo "Downloading Redis $VERSION tarball..."
          curl -fsSL --retry 3 --retry-delay 5 "https://github.com/redis/redis/archive/refs/tags/${VERSION}.tar.gz" \
            -o /tmp/redis.tar.gz
          SHA256=$(sha256sum /tmp/redis.tar.gz | awk '{print $1}')
          rm /tmp/redis.tar.gz
          echo "SHA256: $SHA256"

          # Update redis-slim/melange.yaml - version
          sed -i "s/^  version: .*/  version: $VERSION/" redis-slim/melange.yaml

          # Update redis-slim/melange.yaml - checksum
          sed -i "s/^  sha256: .*/  sha256: $SHA256/" redis-slim/melange.yaml

          # Reset epoch to 0 for new upstream version
          sed -i "s/^  epoch: .*/  epoch: 0/" redis-slim/melange.yaml


          # Verify changes
          echo "=== redis-slim/melange.yaml ==="
          grep -E '(version:|sha256:)' redis-slim/melange.yaml | head -2

      - name: Create PR and enable auto-merge
        if: steps.check.outputs.update_available == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="update-redis-${{ steps.check.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(redis): bump to ${{ steps.check.outputs.new_version }}"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore(redis): bump to ${{ steps.check.outputs.new_version }}" \
            --label dependencies --label redis \
            --body "$(cat <<'PRBODY'
          ## Summary
          
          Updates Redis from `${{ steps.check.outputs.current_version }}` to `${{ steps.check.outputs.new_version }}`.
          
          ## Changes
          
          - `redis-slim/melange.yaml` - package version, SHA256 checksum, epoch reset
          
          ## Image Tag
          
          Once merged, this will publish: `ghcr.io/rtvkiz/minimal-redis-slim:${{ steps.check.outputs.new_version }}-r0`
          
          ## Links
          
          - [Redis Releases](https://github.com/redis/redis/releases)
          - [Release Notes for ${{ steps.check.outputs.new_version }}](https://github.com/redis/redis/releases/tag/${{ steps.check.outputs.new_version }})
          
          ---
          
          This PR was automatically created by the [update-redis](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-redis.yml) workflow.
          PRBODY
          )")
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --auto --squash --delete-branch

