name: Update Prometheus Version

on:
  schedule:
    # Check daily at 7:20am UTC
    - cron: '20 7 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
        with:


            - name: Check for new Prometheus stable version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get latest stable 3.x release from GitHub
          LATEST_TAG=$(curl -sS --retry 3 --retry-delay 5 \
            --header "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/prometheus/prometheus/releases/latest" | \
            jq -r '.tag_name')

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "::error::Failed to fetch latest Prometheus version"
            exit 1
          fi

          # Strip leading 'v' prefix
          LATEST="${LATEST_TAG#v}"

          # Validate version format strictly
          if ! [[ "$LATEST" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid Prometheus version received: $LATEST"
            exit 1
          fi

          # Get current version from melange.yaml
          CURRENT=$(grep '^  version:' prometheus/melange.yaml | awk '{print $2}')

          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "Update available: $CURRENT -> $LATEST"
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Update version and checksum in all files
        if: steps.check.outputs.update_available == 'true'
        run: |
          VERSION="${{ steps.check.outputs.new_version }}"
          echo "Updating to Prometheus $VERSION"

          # Download tarball and compute SHA256 checksum
          echo "Downloading Prometheus $VERSION tarball..."
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/prometheus/prometheus/archive/refs/tags/v${VERSION}.tar.gz" \
            -o /tmp/prometheus.tar.gz
          SHA256=$(sha256sum /tmp/prometheus.tar.gz | awk '{print $1}')
          rm /tmp/prometheus.tar.gz
          echo "SHA256: $SHA256"

          # Update prometheus/melange.yaml - version
          sed -i "s/^  version: .*/  version: $VERSION/" prometheus/melange.yaml

          # Update prometheus/melange.yaml - checksum
          sed -i "s/^  sha256: .*/  sha256: $SHA256/" prometheus/melange.yaml

          # Reset epoch to 0 for new upstream version
          sed -i "s/^  epoch: .*/  epoch: 0/" prometheus/melange.yaml


          # Verify changes
          echo "=== prometheus/melange.yaml ==="
          grep -E '(version:|sha256:)' prometheus/melange.yaml | head -2

      - name: Create PR and enable auto-merge
        if: steps.check.outputs.update_available == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="update-prometheus-${{ steps.check.outputs.new_version }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(prometheus): bump to ${{ steps.check.outputs.new_version }}"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore(prometheus): bump to ${{ steps.check.outputs.new_version }}" \
            --label dependencies --label prometheus \
            --body "$(cat <<'PRBODY'
          ## Summary
          
          Updates Prometheus from `${{ steps.check.outputs.current_version }}` to `${{ steps.check.outputs.new_version }}`.
          
          ## Changes
          
          - `prometheus/melange.yaml` - package version, SHA256 checksum, epoch reset
          
          ## Image Tag
          
          Once merged, this will publish: `ghcr.io/rtvkiz/minimal-prometheus:${{ steps.check.outputs.new_version }}-r0`
          
          ## Links
          
          - [Prometheus Releases](https://github.com/prometheus/prometheus/releases)
          - [Release Notes for ${{ steps.check.outputs.new_version }}](https://github.com/prometheus/prometheus/releases/tag/v${{ steps.check.outputs.new_version }})
          
          ---
          
          This PR was automatically created by the [update-prometheus](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-prometheus.yml) workflow.
          PRBODY
          )")
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --auto --squash --delete-branch

