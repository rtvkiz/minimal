name: Update etcd Version

on:
  schedule:
    # Check daily at 7:50am UTC
    - cron: '50 7 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check for new etcd 3.x release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT=$(grep '^  version:' etcd/melange.yaml | awk '{print $2}')
          CURRENT_MAJOR=$(echo "$CURRENT" | cut -d. -f1)

          LATEST_TAG=$(curl -sS --retry 3 --retry-delay 5 \
            --header "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/etcd-io/etcd/releases/latest" | \
            jq -r '.tag_name')

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "::error::Failed to fetch latest etcd version"
            exit 1
          fi

          LATEST="${LATEST_TAG#v}"

          if ! [[ "$LATEST" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid etcd version received: $LATEST"
            exit 1
          fi

          LATEST_MAJOR=$(echo "$LATEST" | cut -d. -f1)
          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"

          if [ "$LATEST" != "$CURRENT" ] && [ "$LATEST_MAJOR" = "$CURRENT_MAJOR" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
            [ "$LATEST_MAJOR" != "$CURRENT_MAJOR" ] && echo "::warning::New major version detected: etcd ${LATEST_MAJOR}.x"
            echo "Already up to date"
          fi

      - name: Update version and checksum
        if: steps.check.outputs.update_available == 'true'
        run: |
          VERSION="${{ steps.check.outputs.new_version }}"
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/etcd-io/etcd/archive/refs/tags/v${VERSION}.tar.gz" \
            -o /tmp/etcd.tar.gz
          SHA256=$(sha256sum /tmp/etcd.tar.gz | awk '{print $1}')
          rm /tmp/etcd.tar.gz

          sed -i "s/^  version: .*/  version: $VERSION/" etcd/melange.yaml
          sed -i "s/^  sha256: .*/  sha256: $SHA256/" etcd/melange.yaml
          sed -i "s/^  epoch: .*/  epoch: 0/" etcd/melange.yaml

          echo "=== etcd/melange.yaml ===" && grep -E '(version:|sha256:)' etcd/melange.yaml | head -2

      - name: Create PR and enable auto-merge
        if: steps.check.outputs.update_available == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="update-etcd-${{ steps.check.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(etcd): bump to ${{ steps.check.outputs.new_version }}"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore(etcd): bump to ${{ steps.check.outputs.new_version }}" \
            --label dependencies --label etcd \
            --body "$(cat <<'PRBODY'
          ## Summary
          
          Updates etcd from `${{ steps.check.outputs.current_version }}` to `${{ steps.check.outputs.new_version }}`.
          
          ## Changes
          
          - `etcd/melange.yaml` - package version, SHA256 checksum, epoch reset
          
          ## Image Tag
          
          Once merged, this will publish: `ghcr.io/rtvkiz/minimal-etcd:${{ steps.check.outputs.new_version }}-r0`
          
          ## Links
          
          - [etcd Releases](https://github.com/etcd-io/etcd/releases)
          - [Release Notes for ${{ steps.check.outputs.new_version }}](https://github.com/etcd-io/etcd/releases/tag/v${{ steps.check.outputs.new_version }})
          
          ---
          
          This PR was automatically created by the [update-etcd](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-etcd.yml) workflow.
          PRBODY
          )")
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --auto --squash --delete-branch

