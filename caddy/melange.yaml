# Melange build configuration for minimal Caddy
# Builds Caddy from source (Go) with static binary
# First Go-based melange build in the project

package:
  name: caddy-minimal
  version: 2.11.2
  epoch: 0
  description: "Minimal Caddy web server built from source"
  copyright:
    - license: Apache-2.0

vars:
  # SHA256 checksum of source tarball - updated by update-caddy.yml workflow
  sha256: ee12f7b5f97308708de5067deebb3d3322fc24f6d54f906a47a0a4e8db799122

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - build-base
      - go
      - git

pipeline:
  # Download and verify Caddy source
  - runs: |
      mkdir -p /home/build
      curl -fsSL --retry 5 --retry-all-errors "https://github.com/caddyserver/caddy/archive/refs/tags/v${{package.version}}.tar.gz" \
        -o /home/build/caddy.tar.gz

      # Verify checksum
      echo "${{vars.sha256}}  /home/build/caddy.tar.gz" | sha256sum -c -

      cd /home/build
      tar xzf caddy.tar.gz
      rm caddy.tar.gz



  # patch-go-deps: auto-generated — do not edit manually
  - runs: |
      cd /home/build/caddy-${{package.version}}
      go get github.com/go-jose/go-jose/v3@v3.0.5
      go get github.com/go-jose/go-jose/v4@v4.1.4
      go get github.com/smallstep/certificates@v0.30.0
      go mod tidy
  # end-patch-go-deps

  # Build Caddy from source (static binary)
  - runs: |
      cd /home/build/caddy-${{package.version}}
      GOTOOLCHAIN=local CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w -X github.com/caddyserver/caddy/v2.CustomVersion=v${{package.version}}" \
        -o caddy \
        ./cmd/caddy

  # Install to destdir (no strip needed - Go ldflags already removes debug info)
  - runs: |
      mkdir -p "${{targets.destdir}}/usr/bin"
      cp /home/build/caddy-${{package.version}}/caddy "${{targets.destdir}}/usr/bin/"

  # Verify the build
  - runs: |
      echo "Verifying Caddy build..."
      "${{targets.destdir}}/usr/bin/caddy" version
      echo "Checking binary size..."
      ls -lh "${{targets.destdir}}/usr/bin/caddy"

update:
  enabled: true
  github:
    identifier: caddyserver/caddy
    use-tag: true
    tag-filter: "v2."
