# Minimal RabbitMQ image - built from official generic-unix release via melange
# CVE patching via daily rebuilds; Erlang OTP from Wolfi (CVE-patched)

contents:
  repositories:
    - https://packages.wolfi.dev/os
    # Local melange-built packages (passed via --repository-append CLI flag)
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    # Local signing key passed via --keyring-append CLI flag
  packages:
    # Base filesystem
    - wolfi-baselayout

    # Our RabbitMQ (binary release via melange)
    - rabbitmq-minimal

    # Erlang OTP runtime (required by RabbitMQ)
    # RabbitMQ 4.x requires Erlang 26+; 27 is explicitly supported
    - erlang-27

    # busybox provides sh - required by RabbitMQ's sbin startup scripts
    - busybox

    # Core libraries
    - glibc
    - glibc-locale-posix
    - ld-linux
    - libgcc
    - libstdc++

    # TLS/SSL - required for Erlang TLS and RabbitMQ AMQPS/HTTPS
    - libssl3
    - libcrypto3

    # Certificates
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: rabbitmq
      gid: 65532
  users:
    - username: rabbitmq
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /opt/rabbitmq/sbin/rabbitmq-server

environment:
  # Erlang needs HOME to store the .erlang.cookie file
  HOME: /var/lib/rabbitmq
  # Redirect data paths away from /opt/rabbitmq (which is the install prefix,
  # not writable at runtime). SYS_PREFIX=${RABBITMQ_HOME} in rabbitmq-defaults
  # makes all paths default to /opt/rabbitmq/var/... without these overrides.
  RABBITMQ_MNESIA_BASE: /var/lib/rabbitmq/mnesia
  RABBITMQ_LOG_BASE: /var/log/rabbitmq
  # Log to stdout (container-friendly)
  RABBITMQ_LOGS: "-"
  PATH: /usr/bin:/bin
  LANG: C.UTF-8

paths:
  # Mnesia database (persistent data - mount a volume here)
  - path: /var/lib/rabbitmq
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  # Config directory (mount rabbitmq.conf here to override defaults)
  - path: /etc/rabbitmq
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  # Log directory (unused when logging to stdout, but some plugins expect it)
  - path: /var/log/rabbitmq
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "minimal-rabbitmq"
  org.opencontainers.image.description: "Hardened RabbitMQ image from official generic-unix release with Wolfi Erlang OTP and daily CVE patches"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/rabbitmq"
  org.opencontainers.image.licenses: "MPL-2.0"

archs:
  - x86_64
  - aarch64
