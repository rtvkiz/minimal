# Melange build configuration for minimal RabbitMQ
# Downloads official generic-unix binary release (pre-compiled BEAM files)
# Runtime Erlang OTP is provided by Wolfi's erlang-27 package at image assembly time

package:
  name: rabbitmq-minimal
  version: 4.3.0
  epoch: 0
  description: "Minimal RabbitMQ message broker from official generic-unix release"
  copyright:
    - license: MPL-2.0

vars:
  # SHA256 of rabbitmq-server-generic-unix-{version}.tar.xz - updated by update-rabbitmq.yml
  sha256: 361be858e59e56c55d8f45b4d92b056a1c974d92de257357333d2c0740b99616

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - xz

pipeline:
  # Download and verify RabbitMQ generic-unix release
  - runs: |
      mkdir -p /home/build
      curl -fsSL --retry 5 --retry-all-errors \
        "https://github.com/rabbitmq/rabbitmq-server/releases/download/v${{package.version}}/rabbitmq-server-generic-unix-${{package.version}}.tar.xz" \
        -o /home/build/rabbitmq.tar.xz

      echo "${{vars.sha256}}  /home/build/rabbitmq.tar.xz" | sha256sum -c -

      cd /home/build
      tar xJf rabbitmq.tar.xz
      rm rabbitmq.tar.xz

  # Install to destdir
  - runs: |
      RMQ_SRC="/home/build/rabbitmq_server-${{package.version}}"

      # Install RabbitMQ tree under /opt/rabbitmq
      mkdir -p "${{targets.destdir}}/opt/rabbitmq"
      cp -a "$RMQ_SRC/." "${{targets.destdir}}/opt/rabbitmq/"

      # Convenience symlinks for CLI tools
      mkdir -p "${{targets.destdir}}/usr/bin"
      ln -sf /opt/rabbitmq/sbin/rabbitmq-server     "${{targets.destdir}}/usr/bin/rabbitmq-server"
      ln -sf /opt/rabbitmq/sbin/rabbitmqctl          "${{targets.destdir}}/usr/bin/rabbitmqctl"
      ln -sf /opt/rabbitmq/sbin/rabbitmq-diagnostics "${{targets.destdir}}/usr/bin/rabbitmq-diagnostics"
      ln -sf /opt/rabbitmq/sbin/rabbitmq-plugins     "${{targets.destdir}}/usr/bin/rabbitmq-plugins"

      # Stub config dir - actual config is mounted by the user or set via env vars
      # (stdout logging is handled by RABBITMQ_LOGS=- in the apko image env)
      mkdir -p "${{targets.destdir}}/etc/rabbitmq"

  # Verify the release
  - runs: |
      echo "Verifying RabbitMQ release..."
      test -f "${{targets.destdir}}/opt/rabbitmq/sbin/rabbitmq-server"
      test -f "${{targets.destdir}}/opt/rabbitmq/sbin/rabbitmqctl"
      echo "Plugin count:"
      ls "${{targets.destdir}}/opt/rabbitmq/plugins/"*.ez 2>/dev/null | wc -l
      echo "Version from sbin:"
      grep -r "VERSION" "${{targets.destdir}}/opt/rabbitmq/sbin/rabbitmq-defaults" || true

update:
  enabled: true
  github:
    identifier: rabbitmq/rabbitmq-server
    use-tag: true
    tag-filter: "v4."
    strip-prefix: "v"
