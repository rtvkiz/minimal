# Minimal Deno image - using Wolfi's pre-built package (shell-less)
# TypeScript-first JS runtime with native permissions sandbox

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - deno
    - glibc
    - glibc-locale-posix
    - libgcc
    - libstdc++
    - libssl3
    - libcrypto3
    - zlib
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/deno

work-dir: /app

environment:
  DENO_DIR: /tmp/.deno
  PATH: /usr/bin:/bin

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "minimal-deno"
  org.opencontainers.image.description: "Hardened shell-less Deno TypeScript runtime built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/deno"
  org.opencontainers.image.licenses: "MIT"

archs:
  - x86_64
  - aarch64
