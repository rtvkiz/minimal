name: Update Go transitive dependencies to latest compatible versions

needs:
  packages:
    - go
    - git

inputs:
  modroot:
    description: |
      Directory containing go.mod. For monorepos with multiple modules,
      call this pipeline once per module directory.
    required: true

pipeline:
  - runs: |
      cd "${{inputs.modroot}}"
      echo "[patch-go-vulns] Updating deps in $(pwd) ..."

      # Ensure deps are fetched from the Go module proxy and verified
      # against the Go checksum database
      export GOPROXY="https://proxy.golang.org,direct"
      export GOSUMDB="sum.golang.org"
      export GONOSUMCHECK=""
      export GONOSUMDB=""

      # Don't auto-download a newer Go toolchain
      export GOTOOLCHAIN=local

      # Try full minor+patch bumps first; if a dep needs a newer Go
      # than what's available, fall back to patch-only bumps
      if ! go get -u ./... 2>/dev/null; then
        echo "[patch-go-vulns] Full update hit Go version ceiling, falling back to patch-only"
        go get -u=patch ./...
      fi
      go mod tidy
      echo "[patch-go-vulns] Done"
