# Minimal Jaeger image - built from source via melange
# Jaeger v2: single binary, OTLP-native, in-memory storage by default

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - jaeger-minimal
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: jaeger
      gid: 65532
  users:
    - username: jaeger
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/jaeger

cmd: --config=/etc/jaeger/config.yaml

environment:
  PATH: /usr/bin:/bin

paths:
  - path: /etc/jaeger
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "minimal-jaeger"
  org.opencontainers.image.description: "Hardened Jaeger distributed tracing backend built from source via melange"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/jaeger"
  org.opencontainers.image.licenses: "Apache-2.0"

archs:
  - x86_64
  - aarch64
