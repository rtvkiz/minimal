# Minimal Qdrant image - built from source via melange
# Vector search engine for AI/ML: RAG, semantic search, recommendations

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - qdrant-minimal
    - glibc
    - glibc-locale-posix
    - ld-linux
    - libgcc
    - libstdc++
    - libssl3
    - libcrypto3
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: qdrant
      gid: 65532
  users:
    - username: qdrant
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/qdrant

work-dir: /qdrant

environment:
  PATH: /usr/bin:/bin
  QDRANT__SERVICE__HTTP_PORT: "6333"
  QDRANT__SERVICE__GRPC_PORT: "6334"
  QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage

paths:
  - path: /qdrant
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /qdrant/storage
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /qdrant/snapshots
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /etc/qdrant
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

annotations:
  org.opencontainers.image.title: "minimal-qdrant"
  org.opencontainers.image.description: "Hardened Qdrant vector search engine built from source via melange"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/qdrant"
  org.opencontainers.image.licenses: "Apache-2.0"

archs:
  - x86_64
  - aarch64
