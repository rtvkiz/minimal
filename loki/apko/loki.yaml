# Minimal Loki image - log aggregation system by Grafana Labs

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - loki-minimal
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: loki
      gid: 65532
  users:
    - username: loki
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/loki

cmd: -config.file=/etc/loki/loki.yaml

environment:
  PATH: /usr/bin:/bin

paths:
  - path: /etc/loki
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /loki
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

annotations:
  org.opencontainers.image.title: "minimal-loki"
  org.opencontainers.image.description: "Hardened Loki log aggregation server built from source"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/loki"
  org.opencontainers.image.licenses: "AGPL-3.0"

archs:
  - x86_64
  - aarch64
