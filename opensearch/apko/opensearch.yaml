# Minimal OpenSearch image - using Wolfi's pre-built opensearch-3 package
# OpenSearch 3.x with OpenJDK 21 JRE
# CVE patching via daily Wolfi package rebuilds

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    # Base filesystem
    - wolfi-baselayout

    # OpenSearch 3.x from Wolfi (pulls openjdk-21-jre, bash, busybox, curl)
    - opensearch-3
    - openjdk-21-default-jvm

    # Core runtime libraries
    - glibc
    - glibc-locale-posix
    - ld-linux

    # Certificates (required for TLS, cluster comms, and S3 snapshots)
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: opensearch
      gid: 65532
  users:
    - username: opensearch
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/share/opensearch/opensearch-docker-entrypoint.sh

environment:
  OPENSEARCH_HOME: /usr/share/opensearch
  OPENSEARCH_PATH_CONF: /usr/share/opensearch/config
  # Point entrypoint to Wolfi's openjdk-21-jre (no bundled JDK in Wolfi package)
  OPENSEARCH_JAVA_HOME: /usr/lib/jvm/java-21-openjdk
  # Disable security plugin demo config — users configure TLS for production
  DISABLE_INSTALL_DEMO_CONFIG: "true"
  # Disable security plugin entirely for simple single-node dev usage
  # Set to "false" and configure TLS for production clusters
  DISABLE_SECURITY_PLUGIN: "true"
  OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
  # Entrypoint converts dotted env vars to -E<key>=<value> OpenSearch flags.
  # discovery.type=single-node bypasses multi-node bootstrap checks.
  "discovery.type": "single-node"
  LANG: C.UTF-8

paths:
  - path: /usr/share/opensearch/config
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o750
  - path: /usr/share/opensearch/data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /usr/share/opensearch/logs
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "minimal-opensearch"
  org.opencontainers.image.description: "Hardened OpenSearch 3.x image on Wolfi with OpenJDK 21, daily CVE patches"
  org.opencontainers.image.url: "https://github.com/rtvkiz/minimal"
  org.opencontainers.image.source: "https://github.com/rtvkiz/minimal/tree/main/opensearch"
  org.opencontainers.image.licenses: "Apache-2.0"

archs:
  - x86_64
  - aarch64
