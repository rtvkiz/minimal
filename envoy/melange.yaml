package:
  name: envoy-minimal
  version: 1.37.2
  epoch: 0
  description: "Minimal Envoy proxy built from upstream releases"
  copyright:
    - license: Apache-2.0

vars:
  sha256_x86: 32d3cc203b8abdce8c2ed916a298124364e0c48e83b7196f551e769b6a489bf8
  sha256_arm: b0d7fbf29554384ce23e7190090257feb5ca136f145626b3adefabb2d53f878b

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - curl
      - glibc
      - libstdc++
      - libgcc
      - ld-linux

pipeline:
  - runs: |
      BUILD_ARCH=$(uname -m)
      case "$BUILD_ARCH" in
        x86_64) ARCH_NAME="x86_64" ;;
        aarch64) ARCH_NAME="aarch_64" ;;
        *) echo "Unsupported arch: $BUILD_ARCH"; exit 1 ;;
      esac
      
      curl -fsSL "https://github.com/envoyproxy/envoy/releases/download/v${{package.version}}/envoy-${{package.version}}-linux-${ARCH_NAME}" \
        -o /tmp/envoy
      
      if [ "$BUILD_ARCH" = "x86_64" ]; then
        CHECKSUM="${{vars.sha256_x86}}"
      else
        CHECKSUM="${{vars.sha256_arm}}"
      fi
      
      echo "${CHECKSUM}  /tmp/envoy" | sha256sum -c -
      chmod +x /tmp/envoy

  - runs: |
      mkdir -p "${{targets.destdir}}/usr/bin"
      cp /tmp/envoy "${{targets.destdir}}/usr/bin/envoy"

  - runs: |
      "${{targets.destdir}}/usr/bin/envoy" --version

update:
  enabled: true
  github:
    identifier: envoyproxy/envoy
    use-tag: true
    tag-filter: "v"
