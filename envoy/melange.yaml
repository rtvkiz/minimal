package:
  name: envoy-minimal
  version: 1.38.0
  epoch: 0
  description: "Minimal Envoy proxy built from upstream releases"
  copyright:
    - license: Apache-2.0

vars:
  sha256_x86: cca312a7c3f91852f2849995c895130c59842e21ba787dc90bafa4026d6c5ecc
  sha256_arm: 9f00678c0cc433d7a342c422415eb3fdd163e77414aee5c5b57c04bd7d579454

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - curl
      - glibc
      - libstdc++
      - libgcc
      - ld-linux

pipeline:
  - runs: |
      BUILD_ARCH=$(uname -m)
      case "$BUILD_ARCH" in
        x86_64) ARCH_NAME="x86_64" ;;
        aarch64) ARCH_NAME="aarch_64" ;;
        *) echo "Unsupported arch: $BUILD_ARCH"; exit 1 ;;
      esac
      
      curl -fsSL --retry 5 --retry-delay 10 "https://github.com/envoyproxy/envoy/releases/download/v${{package.version}}/envoy-${{package.version}}-linux-${ARCH_NAME}" \
        -o /tmp/envoy
      
      if [ "$BUILD_ARCH" = "x86_64" ]; then
        CHECKSUM="${{vars.sha256_x86}}"
      else
        CHECKSUM="${{vars.sha256_arm}}"
      fi
      
      echo "${CHECKSUM}  /tmp/envoy" | sha256sum -c -
      chmod +x /tmp/envoy

  - runs: |
      mkdir -p "${{targets.destdir}}/usr/bin"
      cp /tmp/envoy "${{targets.destdir}}/usr/bin/envoy"

  - runs: |
      "${{targets.destdir}}/usr/bin/envoy" --version

update:
  enabled: true
  github:
    identifier: envoyproxy/envoy
    use-tag: true
    tag-filter: "v"
