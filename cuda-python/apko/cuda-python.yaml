# Minimal CUDA Python image - Wolfi Python 3.13 + CUDA 12.9 runtime + cuDNN 9.10.1
# CUDA libraries packaged from NVIDIA redistributable tarballs via melange
# For ML inference and runtime workloads (not for compiling CUDA code)

contents:
  repositories:
    - https://packages.wolfi.dev/os
    # Local melange-built packages (passed via --repository-append CLI flag)
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    # Local signing key passed via --keyring-append CLI flag
  packages:
    # Base filesystem layout
    - wolfi-baselayout

    # Python from Wolfi
    - python-3.13

    # Core runtime dependencies
    - glibc
    - glibc-locale-posix
    - ld-linux
    - libgcc
    - libstdc++

    # Python module dependencies
    - libffi
    - zlib
    - libssl3
    - libcrypto3
    - readline
    - ncurses
    - ncurses-terminfo-base

    # Additional stdlib dependencies
    - libexpat1
    - libbz2-1
    - xz
    - libzstd1
    - mpdecimal
    - sqlite-libs
    - gdbm
    - libuuid

    # TLS/SSL certificates
    - ca-certificates-bundle

    # CUDA runtime libraries (built from NVIDIA redist tarballs via melange)
    - cuda-runtime

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/python3

work-dir: /app

environment:
  # Python settings
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONHASHSEED: random
  LANG: C.UTF-8
  PATH: /usr/bin:/bin
  # NVIDIA container runtime detection
  NVIDIA_VISIBLE_DEVICES: all
  NVIDIA_DRIVER_CAPABILITIES: compute,utility

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

archs:
  - x86_64
